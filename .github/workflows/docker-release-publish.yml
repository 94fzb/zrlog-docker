name: ZrLog release version publish

on:
  push:
    branches:
      - main
      - master # 兼容 master
    paths:
      - 'VERSION.txt'
      - '.github/workflows/docker-release-publish.yml'
      - 'Dockerfile'
  workflow_dispatch:      # 可手动触发

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Read Version
        id: read_version
        run: echo "DOCKER_TAG_VERSION=$(cat VERSION.txt)" >> $GITHUB_ENV

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: zrlog
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to Aliyun Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: registry.cn-chengdu.aliyuncs.com
          username: 90xchun
          password: ${{ secrets.ALIYUN_DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            zrlog/zrlog:${{ env.DOCKER_TAG_VERSION }}
            zrlog/zrlog:latest
            registry.cn-chengdu.aliyuncs.com/hibegin/zrlog:${{ env.DOCKER_TAG_VERSION }}
            registry.cn-chengdu.aliyuncs.com/hibegin/zrlog:latest
